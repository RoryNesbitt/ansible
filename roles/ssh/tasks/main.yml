---

- name: Check ssh directory exists
  file:
    dest: "{{ ansible_facts.env.HOME }}/.ssh"
    state: directory
  tags:
    - ssh

- name: Add ssh key
  copy:
    src: "{{ ssh_key }}"
    dest: "{{ ansible_facts.env.HOME }}/.ssh/id_ed25519"
    mode: 0600
  tags:
    - ssh

- name: Add public key
  copy:
    src: "{{ ssh_key }}.pub"
    dest: "{{ ansible_facts.env.HOME }}/.ssh/id_ed25519.pub"
    mode: 0644
  tags:
    - ssh

- name: Scan GitHub SSH host keys
  ansible.builtin.command: ssh-keyscan github.com
  register: ssh_scan
  changed_when: false
  tags:
    - ssh

- name: Add GitHub to known_hosts
  ansible.builtin.known_hosts:
    name: github.com
    key: "{{ item }}"
    state: present
  loop: "{{ ssh_scan.stdout_lines | reject('match', '^#') | list }}"
  tags:
    - ssh
- name: Replace authorised keys with new key
  ansible.builtin.authorized_key:
    user: "{{ ansible_facts['user_id'] }}"
    key: "{{ lookup('file', ssh_key + '.pub') }}"
    exclusive: true
  tags:
    - never
    - ssh_replace

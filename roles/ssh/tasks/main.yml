---

- name: Check ssh directory exists
  file:
    dest: $HOME/.ssh
    state: directory
  tags:
    - ssh

- name: Add ssh key
  copy:
    src: "{{ ssh_key }}"
    dest: $HOME/.ssh/id_ed25519
    mode: 0600
  tags:
    - ssh

- name: Add public key
  copy:
    src: "{{ ssh_key }}.pub"
    dest: $HOME/.ssh/id_ed25519.pub
    mode: 0644
  tags:
    - ssh

- name: Replace authorised keys with new key
  ansible.builtin.authorized_key:
    user: "{{ ansible_facts['user_id'] }}"
    key: "{{ lookup('file', ssh_key + '.pub') }}"
    exclusive: true
  tags:
    - never
    - ssh_replace
